<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban de tareas</title>

    <link rel="stylesheet" href="css/estils.css" />
  </head>

  <body>
    <header>
      <h1>Gestor de tareas Kanban</h1>
    </header>

    <main>
      <section id="form-section">
        <h2>Crear tarea</h2>

        <form id="task-form">
          <div>
            <label for="titulo">Título *</label>
            <input type="text" id="titulo" name="titulo" required />
          </div>

          <div>
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" name="descripcion"></textarea>
          </div>

          <div>
            <label for="prioridad">Prioridad</label>
            <select id="prioridad" name="prioridad">
              <option value="baixa">Baja</option>
              <option value="mitjana">Media</option>
              <option value="alta">Alta</option>
            </select>
          </div>

          <div>
            <label for="fecha">Fecha límite</label>
            <input type="date" id="fecha" name="fecha" />
          </div>

          <button type="submit">Añadir tarea</button>
        </form>
      </section>

      <aside id="sidebar">
        <section id="filters-section">
          <h2>Filtros</h2>

          <label for="filtro-estado">Estado</label>
          <select id="filtro-estado" name="filtro-estado">
            <option value="todos">Todos</option>
            <option value="perFer">Por hacer</option>
            <option value="enCurs">En curso</option>
            <option value="fet">Hecho</option>
          </select>

          <label for="busqueda">Buscar</label>
          <input type="text" id="busqueda" placeholder="Buscar tareas..." />
        </section>

        <section id="estadisticas">
          <h2>Estadísticas</h2>

          <p>Total: <span id="total">0</span></p>
          <p>Por hacer: <span id="stat-perFer">0</span></p>
          <p>En curso: <span id="stat-enCurs">0</span></p>
          <p>Hechas: <span id="stat-fet">0</span></p>
        </section>
      </aside>

      <section id="kanban-board">
        <div class="column" id="perFer">
          <h3>Por hacer</h3>

          <div class="task-list" id="list-perFer"></div>
        </div>

        <div class="column" id="enCurs">
          <h3>En curso</h3>

          <div class="task-list" id="list-enCurs"></div>
        </div>

        <div class="column" id="fet">
          <h3>Hecho</h3>

          <div class="task-list" id="list-fet"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <p>Proyecto DAW06 - Gestor de tareas Kanban</p>
        <p>Desarrollo de aplicaciones web</p>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
