<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban de tareas</title>

    <link rel="stylesheet" href="css/estils.css" />
  </head>

  <body>
    <header>
      <h1>Gestor de tareas Kanban</h1>
    </header>

    <main>
      <div id="top-sections">
        <section id="form-section">
          <h2>Crear tarea</h2>

          <form id="task-form">
            <div class="form-group">
              <label>Título</label>
              <input type="text" id="titulo" required />
            </div>

            <div class="form-group">
              <label>Descripción</label>
              <textarea id="descripcion"></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Prioridad</label>
                <select id="prioridad">
                  <option value="baixa">Baja</option>
                  <option value="mitjana">Media</option>
                  <option value="alta">Alta</option>
                </select>
              </div>

              <div class="form-group">
                <label>Fecha límite</label>
                <input type="date" id="fecha" />
              </div>
            </div>

            <button type="submit">Añadir tarea</button>
          </form>
        </section>

        <section id="filters-section">
          <h2>Filtros</h2>

          <label for="filtro-estado">Estado</label>
          <select id="filtro-estado" name="filtro-estado">
            <option value="todos">Todos</option>
            <option value="perFer">Por hacer</option>
            <option value="enCurs">En curso</option>
            <option value="fet">Hecho</option>
          </select>

          <label for="busqueda">Buscar</label>
          <input type="text" id="busqueda" placeholder="Buscar tareas..." />
        </section>

        <div id="estadisticas">
          <h2>Estadísticas</h2>
          <div class="stat-item stat-total">
            <span>Total</span>
            <span id="total"></span>
          </div>

          <div class="stat-item stat-perFer">
            <span>Por hacer</span>
            <span id="stat-perFer"></span>
          </div>

          <div class="stat-item stat-enCurs">
            <span>En curso</span>
            <span id="stat-enCurs"></span>
          </div>

          <div class="stat-item stat-fet">
            <span>Hechas</span>
            <span id="stat-fet"></span>
          </div>
        </div>
      </div>

      <section id="kanban-board">
        <div class="column" id="perFer">
          <h3>Por hacer</h3>

          <div class="task-list" id="list-perFer"></div>
        </div>

        <div class="column" id="enCurs">
          <h3>En curso</h3>

          <div class="task-list" id="list-enCurs"></div>
        </div>

        <div class="column" id="fet">
          <h3>Hecho</h3>

          <div class="task-list" id="list-fet"></div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <p>Proyecto DAW06 - Gestor de tareas Kanban</p>
        <p>Desarrollo de aplicaciones web</p>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
